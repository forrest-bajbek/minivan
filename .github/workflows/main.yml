name: Continuous Integration

on: [push]
env:
  IMAGE: ghcr.io/$(echo $GITHUB_REPOSITORY | tr '[A-Z]' '[a-z]')/minivan

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2.4.0
        with:
          ref: master
      - name: Log in to GitHub Packages
        run: echo ${GITHUB_TOKEN} | docker login -u ${GITHUB_ACTOR} --password-stdin ghcr.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull images
        run: |
          docker pull ${{ env.IMAGE }}-builder:latest || true
          docker pull ${{ env.IMAGE }}-final:latest || true
      - name: Build images
        run: |
          docker build \
            --target builder \
            --cache-from ${{ env.IMAGE }}-builder:latest \
            --tag ${{ env.IMAGE }}-builder:latest \
            --file ./src/Dockerfile.prod \
            "./src"
          docker build \
            --cache-from ${{ env.IMAGE }}-builder:latest \
            --tag ${{ env.IMAGE }}-final:latest \
            --file ./src/Dockerfile.prod \
            "./src"
      - name: Push images
        run: |
          docker push ${{ env.IMAGE }}-builder:latest
          docker push ${{ env.IMAGE }}-final:latest
  test:
    name: Test Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v2.4.0
        with:
          ref: master
      - name: Log in to GitHub Packages
        run: echo ${GITHUB_TOKEN} | docker login -u ${GITHUB_ACTOR} --password-stdin ghcr.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull images
        run: |
          docker pull ${{ env.IMAGE }}-builder:latest
          docker pull ${{ env.IMAGE }}-final:latest
      - name: Run container
        run: |
          docker run \
            -d \
            --name minivan
            -e PORT=8765
            -e ENVIRONMENT=dev
            -e DATABASE_URL=sqlite://sqlite.db \
            -p 5003:8765
            ${{ env.IMAGE }}-final:latest
      - name: Install testing requirements
        run: docker exec minivan pip install black==22.6.0 flake8==4.0.1 isort==5.10.1 pytest==7.1.2
      - name: Pytest
        run: docker exec minivan python -m pytest .
      - name: Flake8
        run: docker exec minivan python -m flake8 .
      - name: Formatting (Black)
        run: docker exec minivan python -m black . --check
      - name: Formatting (isort)
        run: docker exec minivan python -m isort . --check-only
