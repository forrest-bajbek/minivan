version: '3.8'

services:
  app:
    build: ./src
    command: uvicorn app.main:app --reload --workers 1 --host 0.0.0.0 --port 8000
    volumes:
      - ./src:/usr/src/app
    ports:
      - 8000:8000
    depends_on:
      - db
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - REDIS_HOST=db
      - REDIS_PORT=6379
      - REDIS_DB=0
      - ENVIRONMENT=dev
      - TESTING=0

  db:
    image: redislabs/rejson:2.0.11
    ports:
      - 6379:6379
